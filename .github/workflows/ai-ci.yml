name: AI CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env
        run: echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env

      - name: Run Ruff
        run: ruff check .

      - name: Run MyPy
        run: mypy src/ --ignore-missing-imports

      - name: Run Pytest with JSON Report
        run: pytest tests/test_eval.py -v --json-report --json-report-file=report.json

      - name: Check Evaluation Pass Rate
        run: python scripts/check_thresholds.py report.json
